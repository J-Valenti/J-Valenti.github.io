<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Paper Halo</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        >
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <nav class="single-column">
                <a href="#" class="name">
                    <img
                        src="images/paper_halo_logo.png"
                        alt="Paper Halo Pin Logo"
                    >
                </a>
                <p><a href="index.html">Home</a></p>
                <p><a href="music.html">Music</a></p>
                <p><a href="merch.html">Merch</a></p>
                <p><a href="tour.html">Tour</a></p>
            </nav>
        </header>
        <div class="card-container">
            <div class="card">
                <div class="pic">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <img 
                                    src="images/paper_sweatshirt.png" 
                                    alt="Paper Halo Crewneck Sweatshirt"
                                >
                            </div>
                            <div class="flip-card-back">
                                <img 
                                    src="images/sweatshirt_back.png" 
                                    alt="Paper Halo Crewneck Sweatshirt"
                                >
                            </div>
                        </div>
                    </div>
                </div>
                <h2>Band Sweatshirt</h2>
                <h3>$50.00 USD</h3>
            </div>
            <div class="card">
                <div class="pic">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <img 
                                    src="images/Pin_shirt.png" 
                                    alt="Paper Halo Tour T-shirt"
                                >
                            </div>
                            <div class="flip-card-back">
                                <img 
                                    src="images/pin_shirt_back.png" 
                                    alt="Paper Halo Tour T-shirt"
                                >
                            </div>
                        </div>
                    </div>
                </div>
                <h2>Pin Tour Shirt</h2>
                <h3>$35.00 USD</h3>
            </div>
            <div class="card">
                <div class="pic">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <img 
                                    src="images/Asset 2.png" 
                                    alt="Paper Halo Trucker Hat"
                                >
                            </div>
                            <div class="flip-card-back">
                                <img 
                                    src="images/baseball_pin.jpg" 
                                    alt="Paper Halo Trucker Hat"
                                >
                            </div>
                        </div>
                    </div>
                </div>
                <h2>Pin Trucker Hat</h2>
                <h3>$40.00 USD</h3>
            </div>
        <div id="social">
            <i class="fa-brands fa-instagram fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-facebook fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-x-twitter fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-tiktok fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-youtube fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-snapchat fa-2xl" style="color: rgb(226, 22, 210);"></i>
            <i class="fa-brands fa-soundcloud fa-2xl" style="color: rgb(226, 22, 210);"></i>
        </div>
    </body>
</html>
